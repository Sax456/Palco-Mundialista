<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polla Mundial TDT</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff7a00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TDT Mundial">
  <link rel="apple-touch-icon" href="IMG/icons/icon-192.png">
</head>
<body>

<div class="loginWrapper">

  <!-- CARD LOGIN -->
  <div class="login" id="cardLogin">
    <center><h1>POLLA MUNDIAL TDT ⚽</h1></center>

    <div class="contenidologin">
      <input id="user" type="number" placeholder="Cédula" inputmode="numeric">
      <input id="pass" type="password" placeholder="Contraseña">
      <button onclick="login()">ENTRAR</button>
      <hr>
      <button id="btnCrearCuenta" onclick="mostrarRegistro()">REGISTRARSE</button>
    </div>

    <p id="error" style="color:#f87171; text-align:center; margin-top:10px;"></p>
  </div>

  <!-- CARD REGISTRO (aparece al lado en PC) -->
  <div class="login loginRegistro" id="cardRegistro">
    <h3><center>REGISTRO EMPLEADOS</center></h3>

    <input id="nombreReal" placeholder="Nombre completo">
    <input id="nuevoUser"  type="number" placeholder="Documento del usuario" inputmode="numeric">
    <input id="nuevoPass"  type="password" placeholder="Contraseña">
    <input id="codigo"     placeholder="Código empresa">

    <button onclick="registrar()">CREAR CUENTA</button>
    <button onclick="cancelarRegistro()"
      style="margin-top:8px; background:#1f2937; border:1px solid #374151;">
      CANCELAR
    </button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
