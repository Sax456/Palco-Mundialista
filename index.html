<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TDT Mundial</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/responsive.css">
<style>

body, html{
margin:0;
padding:0;
height:100%;
font-family:Arial, sans-serif;
overflow:hidden;
}


/* 🎥 VIDEO */
.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* 🖤 OVERLAY OSCURO */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

/* 📦 CONTENIDO */
.contenido{
position:relative;
z-index:2;
height:90%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

/* 🏆 TITULO */
h1{
font-family: 'AkaPosse', sans-serif;
font-size:120px;
margin-bottom:10px;
letter-spacing: 2px;
}

/* ⚽ SUBTEXTO */
p{
font-size:20px;
margin-bottom:30px;
}


.logo{

width: 150px;
padding: 0px;
margin: 0px;
}


/* 🔥 BOTONES */
.botones{
display:flex;
gap:20px;
}

button{
padding:15px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

/* LOGIN */
.btnLogin{
background:#ff7b00;
color:black;
}

.btnLogin:hover{
background:#ffa600;
}

/* REGISTRO */
.btnRegistro{
background:transparent;
border:2px solid white;
color:white;
}

.btnRegistro:hover{
background:white;
color:black;
}

</style>

</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop class="video-bg">
<source src="VIDEO/PixVerse_V6_Image_Text_360P_me_puedes_crear_un (1).mp4" type="video/mp4">
</video>

<!-- 🖤 CAPA OSCURA -->
<div class="overlay"></div>

<!-- 📦 CONTENIDO -->
<div class="contenido">

<center><h1>TIERRA DE TODOS</h1></center>

<img src="IMG/LOGO SOLO.png" class="logo">

<p>Vive el mundial como nunca antes. Predice, compite y gana.</p>

<div class="botones">

<button class="btnLogin" onclick="irLogin()">
Iniciar Sesión
</button>


</div>

</div>

<script>

function irLogin(){
window.location.href = "login.html"
}

function irRegistro(){
window.location.href = "registro.html"
}

</script>

</body>
</html>
